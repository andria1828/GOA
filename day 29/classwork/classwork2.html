<!-- Block elements არიან HTML-ის ელემენტები, რომლებიც აიღებენ სრული ფარდობის სივრცის სინტაქსს და მათზე მდგომარეობს გადაცემული სხვა ელემენტები. Inline elements კი არიან HTML-ის ელემენტები, რომლებიც არ აიღებენ სრული ფარდობის სივრცის სინტაქსს და მათზე მდგომარეობს გადაცემული სხვა ელემენტები.

Block elemens:

<div> - ბლოკ ელემენტი სტანდარტულად.
<p> - აბზაცის ელემენტი.
<h1> - <h6> - სათაურის ელემენტები.
<ul>, <ol>, <li> - სიის ელემენტები.
<blockquote> - ციტირების ელემენტი.
Inline elemsents:

<span> - ინლაინ ელემენტი სტანდარტულად.
<a> - ბმულის ელემენტი.
<strong>, <em> - შემცირებელი და გამღები ტექსტის მონიშვნის ელემენტები.
<img> - სურათის ელემენტი.
<br>, <span>, <input> - სხვა ელემენტები ინლაინ ელემენტებია.
განსხვავებები:

Block elements არის ფარდობისა და სტრუქტურის ფართობში გადაცემული, ხოლო inline elements იქნება ელემენტები ტექსტში და ინტერაქტიულ ელემენტებში, როგორც მაგალითად ბმულის და სურათის ელემენტებში -->
